<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercedes-Benz</title>
    <link rel="stylesheet" href="./style.css">

    <link rel="icon" href="./Fotos/mb-star-svg.svg" type="image/png">
</head>

<body>
    <section id="1" class="hero">
        <img class="innovation" src="./Fotos/innovation.png" alt="">
        <div class="navbar">
            <div class="nav-left">
                <a href="#Menu">Menu</a>
                <a href="#About">About</a>
                <a href="#Foto">Foto</a>
                <a href="#News">News</a>
            </div>

            <div class="nav-right">
                <a href="#Shop">Shop</a>
                <a href="#Location">Location</a>
                <a href="#Contacts">Contact Us</a>
                <div class="lang-buttons">
                    <button onclick="changeLang('az')">AZ</button>
                    <button onclick="changeLang('en')">EN</button>
                    <button onclick="changeLang('ru')">RU</button>
                </div>
            </div>
        </div>
        <a href="https://www.mercedes-benz.com.az/" target="_blank">
            <div class="logo">
                <img class="logo1" src="./Fotos/mb-star-svg.svg">
            </div>
        </a>
        <div class="content">
            <h1>MERCEDES-BENZ</h1>
            <h2>1886-2026</h2>

            <div class="date ">“Approximately 20–25 models”</div>
            <div class="location">Made in Germany</div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</html>
